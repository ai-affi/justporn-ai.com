  <script>
    // ============================================
    // CONFIGURATION - Changez l'ID affilié ici
    // ============================================
    const AFFILIATE_ID = 'AFFILIATE_ID';
    const AFFILIATE_BASE_URL = '/go';
    
    // ============================================
    // i18n SYSTEM - Charge le JSON et injecte les textes
    // ============================================
    let i18nData = {};
    
    async function loadI18n() {
      try {
        const response = await fetch('../content.json');
        i18nData = await response.json();
        applyI18n();
        renderDynamicContent();
        initSchema();
      } catch (e) {
        console.error('Failed to load translations:', e);
      }
    }
    
    function applyI18n() {
      // Attributs data-i18n
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        const value = getNestedValue(i18nData, key);
        if (value) {
          const attr = el.getAttribute('data-i18n-attr');
          if (attr) {
            el.setAttribute(attr, value);
          } else {
            el.textContent = value;
          }
        }
      });
    }
    
    function getNestedValue(obj, path) {
      return path.split('.').reduce((current, key) => current?.[key], obj);
    }
    
    // ============================================
    // RENDER DYNAMIC CONTENT FROM JSON
    // ============================================
    function renderDynamicContent() {
      renderFeatures();
      renderSteps();
      renderPricing();
      renderFAQ();
      renderTrustBadges();
      renderFooterLinks();
      renderSocialLinks();
      renderParticles();
    }
    
    function renderFeatures() {
      const container = document.getElementById('features-grid');
      const features = i18nData.features?.items || [];
      const icons = {
        palette: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ff2d7a" stroke-width="2"><circle cx="13.5" cy="6.5" r=".5" fill="#ff2d7a"/><circle cx="17.5" cy="10.5" r=".5" fill="#ff2d7a"/><circle cx="8.5" cy="7.5" r=".5" fill="#ff2d7a"/><circle cx="6.5" cy="12.5" r=".5" fill="#ff2d7a"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.01 17.461 2 12 2z"/></svg>',
        video: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2"><path d="m22 8-6 4 6 4V8Z"/><rect width="14" height="12" x="2" y="6" rx="2" ry="2"/></svg>',
        target: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f97316" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>',
        sparkles: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>',
        lock: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',
        zap: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ff2d7a" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>'
      };
      
      container.innerHTML = features.map((f, i) => `
        <div class="glass rounded-xl p-6 card-hover scroll-reveal" style="transition-delay: ${i * 0.1}s">
          <div class="w-12 h-12 rounded-lg bg-white/5 flex items-center justify-center mb-4">
            ${icons[f.icon] || icons.sparkles}
          </div>
          <h3 class="text-lg font-semibold mb-2">${f.title}</h3>
          <p class="text-sm text-jp-text-secondary">${f.description}</p>
        </div>
      `).join('');
    }
    
    function renderSteps() {
      const container = document.getElementById('steps-grid');
      const steps = i18nData.how_it_works?.steps || [];
      
      container.innerHTML = steps.map((s, i) => `
        <div class="relative text-center scroll-reveal" style="transition-delay: ${i * 0.15}s">
          ${i < steps.length - 1 ? '<div class="step-connector hidden lg:block"></div>' : ''}
          <div class="relative z-10 w-12 h-12 mx-auto mb-4 rounded-full gradient-cta flex items-center justify-center text-white font-bold text-lg">
            ${s.step}
          </div>
          <h3 class="text-lg font-semibold mb-2">${s.title}</h3>
          <p class="text-sm text-jp-text-secondary">${s.description}</p>
        </div>
      `).join('');
    }
    
    function renderPricing() {
      const container = document.getElementById('pricing-grid');
      const plans = i18nData.pricing?.plans || [];
      
      container.innerHTML = plans.map((p, i) => {
        const isPopular = p.popular;
        const cardClass = isPopular ? 'popular-card glass rounded-xl p-6' : 'glass rounded-xl p-6 card-hover';
        const badgeClass = p.badge_color ? `badge-${p.badge_color}` : 'gradient-cta';
        const badgeStyle = p.badge_color === 'gold' ? 'color: #000;' : '';
        
        let priceHtml = '';
        if (p.price) {
          priceHtml = `<div class="text-4xl font-extrabold mb-1">${p.price}</div>`;
        } else if (p.price_initial) {
          priceHtml = `
            <div class="text-sm text-jp-text-secondary mb-1">${p.badge || ''}</div>
            <div class="text-4xl font-extrabold mb-1">${p.price_initial}</div>
            ${p.price_old ? `<div class="text-sm price-old">${p.price_old}</div>` : ''}
            <div class="text-sm text-jp-text-secondary">${p.period || ''}</div>
            ${p.save_amount ? `<div class="text-sm text-jp-green mt-1">Save ${p.save_amount}</div>` : ''}
          `;
        }
        
        return `
          <div class="${cardClass} scroll-reveal" style="transition-delay: ${i * 0.1}s">
            ${isPopular ? '<div class="popular-ribbon" data-i18n="pricing.most_popular"></div>' : ''}
            ${p.badge ? `<div class="inline-block px-3 py-1 rounded-full text-xs font-semibold text-white ${badgeClass} mb-4" style="${badgeStyle}">${p.badge}</div>` : ''}
            <h3 class="text-xl font-bold mb-2">${p.name}</h3>
            ${priceHtml}
            <ul class="mt-6 space-y-3 mb-6">
              ${p.features.map(f => `<li class="flex items-start gap-2 text-sm"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg><span class="text-jp-text-secondary">${f}</span></li>`).join('')}
            </ul>
            <a href="${AFFILIATE_BASE_URL}?ref=${AFFILIATE_ID}" class="block w-full text-center py-3 rounded-lg font-medium transition-all ${isPopular ? 'gradient-cta text-white glow-rose' : 'border border-jp-border text-white hover:bg-white/5'}">
              ${p.cta_text}
            </a>
          </div>
        `;
      }).join('');
    }
    
    function renderFAQ() {
      const container = document.getElementById('faq-container');
      const faqs = i18nData.faq?.items || [];
      
      container.innerHTML = faqs.map((f, i) => `
        <div class="glass rounded-xl overflow-hidden scroll-reveal" style="transition-delay: ${i * 0.05}s">
          <button class="faq-trigger w-full flex items-center justify-between p-5 text-left" data-faq="${i}">
            <span class="font-medium pr-4">${f.question}</span>
            <svg class="faq-icon flex-shrink-0" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          </button>
          <div class="faq-content px-5" id="faq-content-${i}">
            <div class="pb-5 text-jp-text-secondary text-sm">${f.answer}</div>
          </div>
        </div>
      `).join('');
      
      // FAQ accordion logic
      document.querySelectorAll('.faq-trigger').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.getAttribute('data-faq');
          const content = document.getElementById(`faq-content-${id}`);
          const icon = btn.querySelector('.faq-icon');
          const isOpen = content.classList.contains('open');
          
          // Close all
          document.querySelectorAll('.faq-content').forEach(c => c.classList.remove('open'));
          document.querySelectorAll('.faq-icon').forEach(ic => ic.classList.remove('open'));
          
          // Open clicked if was closed
          if (!isOpen) {
            content.classList.add('open');
            icon.classList.add('open');
          }
        });
      });
    }
    
    function renderTrustBadges() {
      const container = document.getElementById('trust-badges');
      const badges = i18nData.cta_banner?.trust_badges || [];
      const icons = ['🔒', '⚡', '🚫'];
      
      container.innerHTML = badges.map((b, i) => `
        <div class="flex items-center gap-2 text-sm text-jp-text-secondary">
          <span>${icons[i] || '✓'}</span>
          <span>${b}</span>
        </div>
      `).join('');
    }
    
    function renderFooterLinks() {
      const container = document.getElementById('footer-links');
      const links = i18nData.footer?.links || [];
      
      container.innerHTML = links.map(l => `
        <a href="${l.href}" class="text-sm text-jp-text-secondary hover:text-white transition-colors">${l.label}</a>
      `).join('');
    }

    function renderParticles() {
      const container = document.getElementById('particles');
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 8 + 's';
        p.style.animationDuration = (6 + Math.random() * 6) + 's';
        container.appendChild(p);
      }
    }
    
    // ============================================
    // SCHEMA.ORG JSON-LD
    // ============================================
    function initSchema() {
      // FAQ Schema
      const faqs = i18nData.faq?.items || [];
      const faqSchema = {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": faqs.map(f => ({
          "@type": "Question",
          "name": f.question,
          "acceptedAnswer": {
            "@type": "Answer",
            "text": f.answer
          }
        }))
      };
      document.getElementById('schema-faq').textContent = JSON.stringify(faqSchema);
      
      // Organization Schema
      const orgSchema = {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": i18nData.site?.name || "JustPorn.ai",
        "url": "https://justporn.ai",
        "logo": "https://justporn.ai/logo.png",
        "description": i18nData.meta?.description || ""
      };
      document.getElementById('schema-org').textContent = JSON.stringify(orgSchema);
    }
    
    // ============================================
    // SCROLL REVEAL (Intersection Observer)
    // ============================================
    function initScrollReveal() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.1 });
      
      document.querySelectorAll('.scroll-reveal').forEach(el => observer.observe(el));
    }
    
    // ============================================
    // MOBILE MENU
    // ============================================
    function initMobileMenu() {
      const btn = document.getElementById('mobile-menu-btn');
      const menu = document.getElementById('mobile-menu');
      
      btn.addEventListener('click', () => {
        menu.classList.toggle('open');
      });
      
      // Close on link click
      menu.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => menu.classList.remove('open'));
      });
    }
    
    // ============================================
    // SMOOTH SCROLL
    // ============================================
    function initSmoothScroll() {
      document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener('click', function(e) {
          e.preventDefault();
          const target = document.querySelector(this.getAttribute('href'));
          if (target) {
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        });
      });
    }
    
    // ============================================
    // INIT
    // ============================================
    document.addEventListener('DOMContentLoaded', () => {
      loadI18n().then(() => {
        initScrollReveal();
        initMobileMenu();
        initSmoothScroll();
      });
    });
  </script>
